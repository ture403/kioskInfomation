server:
  port: 8080
  servlet:
    session:
      timeout: 30m # 관리자 로그인 세션 유지 시간 (기본값 30분)

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:h2:file:C:/Premier/data/premierdb;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: "whl307!@"
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  file:
    name: ./logs/premier.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
  level:
    root: INFO

weather:
  api:
    key: "f7fe4b19d63caf666d7c8f6849d04a39826973ab7060ba2652c22689eff62f24"
